[build]
  publish = "public"
  command = "hugo"
  functions = "netlify/functions"

[build.environment]
  HUGO_VERSION = "0.121.1"
  NODE_VERSION = "20"

[context.production.environment]
  HUGO_ENV = "production"
  HUGO_ENABLEGITINFO = "true"

[context.production]
  command = "hugo --buildFuture"

[context.deploy-preview]
  command = "hugo --buildFuture -b $DEPLOY_PRIME_URL"

[context.branch-deploy]
  command = "hugo --buildFuture -b $DEPLOY_PRIME_URL"

# Identity Configuration for Decap CMS

# Experience League Unofficial Chatbot (SPA routing)
[[redirects]]
  from = "/tools/exlunofficialchatbot/*"
  to = "/tools/exlunofficialchatbot/index.html"
  status = 200

[[redirects]]
  from = "/image-admin"
  to = "/image-admin.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# Enable Identity
[identity]
  cookie_expires_in_hours = 336
  cookie_prefix = "nf-auth-"

[[identity.external]]
  provider = "github"
  url = "https://github.com"

[[identity.external]]
  provider = "email"
  url = "mailto:support@thelearningproject.in"
